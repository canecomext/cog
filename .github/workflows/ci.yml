name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format check
        run: deno task fmt:check

      - name: Lint
        run: deno task lint

      - name: Type check
        run: deno task check

      - name: Generate code from models
        run: cd example && deno task cog:psql:generate

      - name: Format check (example)
        run: cd example && deno task fmt:check

      - name: Lint (example)
        run: cd example && deno task lint

      - name: Type check (example)
        run: cd example && deno task check

  tests:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Create example .env
        run: |
          echo "DB_URL=postgresql://test:test@localhost:5432/test" > example/.env

      - name: Generate code from models
        run: cd example && deno task cog:psql:generate

      - name: Initialize database
        run: cd example && deno task db:init

      - name: Run generator tests
        run: deno task test

      - name: Run integration tests
        run: cd example && deno task test:integration

      - name: Generate coverage report (generator tests)
        run: deno coverage --lcov cov/ > cov.lcov

      - name: Generate coverage report (integration tests)
        run: cd example && deno coverage --lcov cov/ > cov.lcov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./cov.lcov,./example/cov.lcov
